<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://img.icons8.com/isometric/50/activity.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechFlow | High-Performance Enterprise OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;950&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; background: #050508; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
      #root { min-height: 100vh; }
      .pre-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #050508; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 20px; position: relative; overflow: hidden; border-radius: 10px; }
      .loader-bar::after {
        content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 50%;
        background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
        animation: loading 1.5s infinite linear;
      }
      @keyframes loading { from { left: -50%; } to { left: 100%; } }
      .pre-loader-logo { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; letter-spacing: -1px; }
    </style>
  </head>
  <body>
    <div class="pre-loader" id="preloader">
      <div class="pre-loader-logo">TECHFLOW</div>
      <div class="loader-bar"></div>
    </div>
    
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => { 
        const loader = document.getElementById('preloader');
        if (loader) {
          setTimeout(() => { 
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 500);
          }, 800); 
        }
      });
    </script>
  </body>
</html>
